paths:
  dataset_dir: ../classes2test
  repos_dir: ../repos
  output_dir: ./output_agentic_smoke
  workspace_dir: ./workspaces_agentic_smoke

filters:
  project_ids:
    - '32488797'
  sample_ids:
    - '32488797_0'
  max_samples: 1

agents:
  generator:
    model: gemini-cli
    command: gemini
    temperature: 0
  critic:
    model: gemini-cli
    command: gemini
    temperature: 0
  analyst:
    model: gemini-cli
    command: gemini
    temperature: 0

strategies:
  - iterative_healing

limits:
  max_semantic_rejections: 2
  max_execution_iterations: 2
  max_failure_log_chars: 4000

evolution:
  operators:
    - return_value_change
    - predicate_inversion
    - boundary_shift
    - exception_path_change

baselines:
  run_human: true
  run_evosuite: false

