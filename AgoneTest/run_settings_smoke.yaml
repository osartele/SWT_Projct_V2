paths:
  dataset_dir: ../classes2test
  repos_dir: ../repos
  output_dir: ./output_agentic_smoke
  workspace_dir: ./workspaces_agentic_smoke
  mapper_cli: ./mapper_cli

filters:
  project_ids:
    - '32488797'
  sample_ids:
    - '32488797_0'
  max_samples: 1

mapping:
  backend: java_sidecar
  scope: module_then_repo
  top_k: 5

agents:
  generator:
    model: gemini-cli
    command: gemini
    temperature: 0
  critic:
    model: gemini-cli
    command: gemini
    temperature: 0
  analyst:
    model: gemini-cli
    command: gemini
    temperature: 0

strategies:
  - iterative_healing

sync:
  context_policy: ast_predicted

limits:
  max_semantic_rejections: 2
  max_execution_iterations: 2
  max_failure_log_chars: 4000

evolution:
  operators:
    - return_value_change
    - predicate_inversion
    - boundary_shift
    - exception_path_change

baselines:
  run_human: true
  run_evosuite: false
