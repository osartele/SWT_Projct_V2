paths:
  dataset_dir: ../classes2test
  repos_dir: ../repos
  output_dir: ./output_agentic
  workspace_dir: ./workspaces_agentic
  mapper_cli: ./mapper_cli

filters:
  project_ids: []
  sample_ids: []
  max_samples:

mapping:
  backend: java_sidecar
  scope: module_then_repo
  top_k: 5

agents:
  generator:
    model: gemini-cli
    command: gemini
    temperature: 0
  critic:
    model: gemini-cli
    command: gemini
    temperature: 0
  analyst:
    model: gemini-cli
    command: gemini
    temperature: 0

strategies:
  - regenerative
  - iterative_healing

sync:
  context_policy: ast_predicted

limits:
  max_semantic_rejections: 3
  max_execution_iterations: 5
  max_failure_log_chars: 8000

evolution:
  operators:
    - predicate_inversion
    - boundary_shift
    - return_value_change
    - exception_path_change

baselines:
  run_human: true
  run_evosuite: true
